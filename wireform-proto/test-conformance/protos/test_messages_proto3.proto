// Vendored (subset) from
// https://github.com/protocolbuffers/protobuf/blob/main/src/google/protobuf/test_messages_proto3.proto
//
// We carry the structural shape of TestAllTypesProto3 (scalars,
// repeated, packed, unpacked, maps, oneofs, nested message and
// enum) but omit the well-known-types arms (Timestamp, Duration,
// Any, Struct, Wrappers, FieldMask, Empty, Value). Those would
// each need a per-WKT cross-file import resolution that
// `loadProto` doesn't currently do.
//
// The conformance handler routes unrecognised fields through
// the message's unknown-fields slot, so wire-format round-trips
// of *any* TestAllTypesProto3 — including those that exercise
// the WKT arms — still pass. Only the JSON branch of the
// handler returns "Skipped" for messages whose payloads carry
// unknown fields (since we can't reasonably re-encode JSON for
// fields whose schema we don't know).

syntax = "proto3";

package protobuf_test_messages.proto3;

message TestAllTypesProto3 {
  message NestedMessage {
    int32 a = 1;
    TestAllTypesProto3 corecursive = 2;
  }

  enum NestedEnum {
    FOO = 0;
    BAR = 1;
    BAZ = 2;
    NEG = -1;
  }

  // Singular scalars.
  int32    optional_int32    = 1;
  int64    optional_int64    = 2;
  uint32   optional_uint32   = 3;
  uint64   optional_uint64   = 4;
  sint32   optional_sint32   = 5;
  sint64   optional_sint64   = 6;
  fixed32  optional_fixed32  = 7;
  fixed64  optional_fixed64  = 8;
  sfixed32 optional_sfixed32 = 9;
  sfixed64 optional_sfixed64 = 10;
  float    optional_float    = 11;
  double   optional_double   = 12;
  bool     optional_bool     = 13;
  string   optional_string   = 14;
  bytes    optional_bytes    = 15;

  NestedMessage  optional_nested_message  = 18;
  ForeignMessage optional_foreign_message = 19;

  NestedEnum  optional_nested_enum  = 21;
  ForeignEnum optional_foreign_enum = 22;

  TestAllTypesProto3 recursive_message = 27;

  // Repeated scalars (default proto3 = packed).
  repeated int32    repeated_int32    = 31;
  repeated int64    repeated_int64    = 32;
  repeated uint32   repeated_uint32   = 33;
  repeated uint64   repeated_uint64   = 34;
  repeated sint32   repeated_sint32   = 35;
  repeated sint64   repeated_sint64   = 36;
  repeated fixed32  repeated_fixed32  = 37;
  repeated fixed64  repeated_fixed64  = 38;
  repeated sfixed32 repeated_sfixed32 = 39;
  repeated sfixed64 repeated_sfixed64 = 40;
  repeated float    repeated_float    = 41;
  repeated double   repeated_double   = 42;
  repeated bool     repeated_bool     = 43;
  repeated string   repeated_string   = 44;
  repeated bytes    repeated_bytes    = 45;

  repeated NestedMessage  repeated_nested_message  = 48;
  repeated ForeignMessage repeated_foreign_message = 49;

  repeated NestedEnum  repeated_nested_enum  = 51;
  repeated ForeignEnum repeated_foreign_enum = 52;

  // Packed (explicit) — same wire format as proto3 default
  // for packable scalars; exercised separately to make sure the
  // packed encoder path is hit when the user writes [packed = true].
  repeated int32    packed_int32    = 75 [packed = true];
  repeated int64    packed_int64    = 76 [packed = true];
  repeated uint32   packed_uint32   = 77 [packed = true];
  repeated uint64   packed_uint64   = 78 [packed = true];
  repeated sint32   packed_sint32   = 79 [packed = true];
  repeated sint64   packed_sint64   = 80 [packed = true];
  repeated fixed32  packed_fixed32  = 81 [packed = true];
  repeated fixed64  packed_fixed64  = 82 [packed = true];
  repeated sfixed32 packed_sfixed32 = 83 [packed = true];
  repeated sfixed64 packed_sfixed64 = 84 [packed = true];
  repeated float    packed_float    = 85 [packed = true];
  repeated double   packed_double   = 86 [packed = true];
  repeated bool     packed_bool     = 87 [packed = true];
  repeated NestedEnum packed_nested_enum = 88 [packed = true];

  // Unpacked (explicit).
  repeated int32    unpacked_int32    = 89  [packed = false];
  repeated int64    unpacked_int64    = 90  [packed = false];
  repeated uint32   unpacked_uint32   = 91  [packed = false];
  repeated uint64   unpacked_uint64   = 92  [packed = false];
  repeated sint32   unpacked_sint32   = 93  [packed = false];
  repeated sint64   unpacked_sint64   = 94  [packed = false];
  repeated fixed32  unpacked_fixed32  = 95  [packed = false];
  repeated fixed64  unpacked_fixed64  = 96  [packed = false];
  repeated sfixed32 unpacked_sfixed32 = 97  [packed = false];
  repeated sfixed64 unpacked_sfixed64 = 98  [packed = false];
  repeated float    unpacked_float    = 99  [packed = false];
  repeated double   unpacked_double   = 100 [packed = false];
  repeated bool     unpacked_bool     = 101 [packed = false];
  repeated NestedEnum unpacked_nested_enum = 102 [packed = false];

  // Maps. Submessage / enum-valued maps come through as proto
  // sub-messages whose value type is one of the FTNamed shapes;
  // loadProto currently treats those as opaque submessages on
  // the value side, which is enough for wire-format round-trip.
  map<int32,    int32>          map_int32_int32          = 56;
  map<int64,    int64>          map_int64_int64          = 57;
  map<uint32,   uint32>         map_uint32_uint32        = 58;
  map<uint64,   uint64>         map_uint64_uint64        = 59;
  map<sint32,   sint32>         map_sint32_sint32        = 60;
  map<sint64,   sint64>         map_sint64_sint64        = 61;
  map<fixed32,  fixed32>        map_fixed32_fixed32      = 62;
  map<fixed64,  fixed64>        map_fixed64_fixed64      = 63;
  map<sfixed32, sfixed32>       map_sfixed32_sfixed32    = 64;
  map<sfixed64, sfixed64>       map_sfixed64_sfixed64    = 65;
  map<int32,    float>          map_int32_float          = 66;
  map<int32,    double>         map_int32_double         = 67;
  map<bool,     bool>           map_bool_bool            = 68;
  map<string,   string>         map_string_string        = 69;
  map<string,   bytes>          map_string_bytes         = 70;

  // Oneof.
  oneof oneof_field {
    uint32        oneof_uint32         = 111;
    NestedMessage oneof_nested_message = 112;
    string        oneof_string         = 113;
    bytes         oneof_bytes          = 114;
    bool          oneof_bool           = 115;
    uint64        oneof_uint64         = 116;
    float         oneof_float          = 117;
    double        oneof_double         = 118;
    NestedEnum    oneof_enum           = 119;
  }

  // The FieldName1..18 stress test for camelCase JSON conversion
  // doesn't add anything for binary wire-format round-trip and
  // is skipped here.

  reserved 501 to 510;
  reserved 999999;
}

message ForeignMessage {
  int32 c = 1;
}

enum ForeignEnum {
  FOREIGN_FOO = 0;
  FOREIGN_BAR = 1;
  FOREIGN_BAZ = 2;
}
