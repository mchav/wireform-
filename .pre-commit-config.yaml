repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '\.l?hs$|\.proto$|\.cabal$'
      - id: trailing-whitespace
        exclude: '\.l?hs$'

  - repo: local
    hooks:
      - id: fourmolu
        name: fourmolu
        entry: fourmolu --mode inplace
        language: system
        files: '\.l?hs(-boot)?$'
        exclude: >-
          (?x)^(
            wireform-proto/src/Proto/Google/Protobuf/(Any|Duration|Empty|FieldMask|SourceContext|Struct|Timestamp|Wrappers|Descriptor)\.hs
            |wireform-proto/src/Proto/Google/Protobuf/Compiler/
            |wireform-proto/temporal-test/
            |wireform-kafka/src/Kafka/Protocol/Generated/
            |wireform-lance/src/Lance/Pb/
            |wireform-orc/src/ORC/Proto/
            |wireform-grpc/
            |grpc-spec/
            |wireform-http2/
          )

      - id: hlint
        name: hlint
        entry: hlint
        language: system
        files: '\.hs$'
        exclude: >-
          (?x)^(
            wireform-proto/src/Proto/Google/Protobuf/(Any|Duration|Empty|FieldMask|SourceContext|Struct|Timestamp|Wrappers|Descriptor)\.hs
            |wireform-proto/src/Proto/Google/Protobuf/Compiler/
            |wireform-proto/temporal-test/
            |wireform-kafka/src/Kafka/Protocol/Generated/
            |wireform-lance/src/Lance/Pb/
            |wireform-orc/src/ORC/Proto/
            |wireform-grpc/
            |grpc-spec/
            |wireform-http2/
          )
