version: "3.8"

# Live-broker Docker fixture for the wireform-kafka integration
# suite.  Bring up with:
#
#   docker compose -f wireform-kafka/test-integration/docker-compose.yml up -d
#   WIREFORM_KAFKA_BROKER=localhost:9092 cabal test \
#     wireform-kafka:wireform-kafka-integration \
#     wireform-kafka:wireform-kafka-streams-integration
#   docker compose -f wireform-kafka/test-integration/docker-compose.yml down
#
# Single-broker KRaft cluster.  Auto-creates the topics the
# transactional integration suite expects.

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: wireform-kafka-it
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      CLUSTER_ID: "wireform-kafka-test-cluster-id-xx"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30

  # Optional second broker so multi-instance / rebalance tests
  # can exercise actual cross-broker moves.  Uncomment if needed.
  # kafka2:
  #   image: apache/kafka:4.0.0
  #   ...
