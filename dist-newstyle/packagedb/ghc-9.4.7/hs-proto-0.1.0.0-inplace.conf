name:                 hs-proto
version:              0.1.0.0
visibility:           public
id:                   hs-proto-0.1.0.0-inplace
key:                  hs-proto-0.1.0.0-inplace
license:              BSD-3-Clause
synopsis:             High-performance Protocol Buffers for Haskell
description:
    A comprehensive Protocol Buffers library featuring:
    .
    * Full proto2/proto3 IDL parser
    * Custom annotation support
    * High-performance wire format encoding/decoding
    * Code generation producing plain Haskell records
    * Zero-copy decoding where possible
    * Packed repeated field support
    * Lazy submessage decoding

abi:                  inplace
exposed:              True
exposed-modules:
    Proto.AST Proto.Annotations Proto.CodeGen Proto.CodeGen.Decode
    Proto.CodeGen.Encode Proto.CodeGen.Types Proto.Decode Proto.Encode
    Proto.Parser Proto.Parser.Lexer Proto.Wire Proto.Wire.Decode
    Proto.Wire.Encode

