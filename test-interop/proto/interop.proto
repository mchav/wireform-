syntax = "proto3";

package interop;

// Exhaustive message covering every scalar type, repeated fields,
// nested messages, oneofs, maps, and enums.
// Used for cross-language conformance testing.

enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

message Scalars {
  double   f_double   = 1;
  float    f_float    = 2;
  int32    f_int32    = 3;
  int64    f_int64    = 4;
  uint32   f_uint32   = 5;
  uint64   f_uint64   = 6;
  sint32   f_sint32   = 7;
  sint64   f_sint64   = 8;
  fixed32  f_fixed32  = 9;
  fixed64  f_fixed64  = 10;
  sfixed32 f_sfixed32 = 11;
  sfixed64 f_sfixed64 = 12;
  bool     f_bool     = 13;
  string   f_string   = 14;
  bytes    f_bytes    = 15;
}

message Nested {
  string label = 1;
  Scalars payload = 2;
  Color color = 3;
}

message Repeated {
  repeated int32  ints    = 1;
  repeated string strings = 2;
  repeated Scalars items  = 3;
}

message MapFields {
  map<string, int32>   str_int   = 1;
  map<int32, string>   int_str   = 2;
  map<string, Scalars> str_msg   = 3;
}

message OneofMsg {
  string name = 1;
  oneof value {
    int32  int_val = 2;
    string str_val = 3;
    bool   bool_val = 4;
    Scalars msg_val = 5;
  }
}

// Wrapper message containing all sub-messages for a single test case.
message TestCase {
  Scalars   scalars  = 1;
  Nested    nested   = 2;
  Repeated  repeated = 3;
  MapFields maps     = 4;
  OneofMsg  oneof    = 5;
}
