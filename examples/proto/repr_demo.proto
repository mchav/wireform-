syntax = "proto3";

message BlobMsg {
  string name = 1;
  bytes data = 2;
}

message IdMsg {
  bytes identifier = 1;
  string label = 2;
}

message ConfigEntry {
  string key = 1;
  string value = 2;
  repeated string tags = 3;
}

// A bundle of map<string, bytes> fields used to demonstrate that
// the @frBytes@ override threads through to the value type of a
// proto map. Each field is independent of the others so the same
// fixture exercises all three BytesRep choices in one round-trip.
message Attachments {
  // No override -- exercises the default StrictBytesRep.
  map<string, bytes> strict_blobs = 1;
  // Overridden to LazyBytesRep below.
  map<string, bytes> lazy_blobs   = 2;
  // Overridden to ShortBytesRep below.
  map<string, bytes> short_blobs  = 3;
}
