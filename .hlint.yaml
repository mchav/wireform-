# False positives: hlint cannot see variable references inside TH splices.
# The lambdas \v and \mt bind variables used by $loopCall / $(caseE ...) via
# varE (mkName "v") / varE (mkName "mt").
- ignore: {name: "Use const", within: [Proto.TH]}

# False positive: maybe BaseMaybe.Nothing BaseMaybe.Just converts between
# two distinct Maybe types (Proto.Internal.Maybe.Maybe vs Data.Maybe.Maybe).
- ignore: {name: "Redundant maybe", within: [Proto.Internal.Maybe]}

# Intentional: these types use unboxed sums where data (not newtype) is
# required for the pattern synonym machinery and to preserve semantics.
- ignore: {name: "Use newtype instead of data", within: [Proto.Wire.Decode, Proto.Internal.Either, Proto.Internal.Maybe]}
