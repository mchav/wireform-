# ---------------------------------------------------------------------------
# Project-wide rules
# ---------------------------------------------------------------------------
- ignore:
    name: "Use list comprehension"

# ---------------------------------------------------------------------------
# Auto-generated modules (Proto.Google.Protobuf.*)
# ---------------------------------------------------------------------------
# These files are produced by `cabal run gen-wkt` and must not be hand-edited.
# The patterns hlint flags are deliberate codegen output; the correct fix is
# to improve the code generator, not to patch the generated files.

- ignore: {within: [Proto.Google.Protobuf.Any]}
- ignore: {within: [Proto.Google.Protobuf.Duration]}
- ignore: {within: [Proto.Google.Protobuf.Empty]}
- ignore: {within: [Proto.Google.Protobuf.FieldMask]}
- ignore: {within: [Proto.Google.Protobuf.SourceContext]}
- ignore: {within: [Proto.Google.Protobuf.Struct]}
- ignore: {within: [Proto.Google.Protobuf.Timestamp]}
- ignore: {within: [Proto.Google.Protobuf.Wrappers]}
- ignore: {within: [Proto.Google.Protobuf.Descriptor]}
- ignore: {within: [Proto.Google.Protobuf.Compiler.Plugin]}

# ---------------------------------------------------------------------------
# Template Haskell false positives
# ---------------------------------------------------------------------------
# hlint cannot see variable references inside TH splices.  The lambdas \v
# and \mt bind variables used by $loopCall / $(caseE ...) via
# varE (mkName "v") / varE (mkName "mt").
- ignore: {name: "Use const", within: [Proto.TH]}

# ---------------------------------------------------------------------------
# Unboxed-sum internals
# ---------------------------------------------------------------------------
# maybe BaseMaybe.Nothing BaseMaybe.Just converts between two distinct
# Maybe types (Proto.Internal.Maybe.Maybe vs Data.Maybe.Maybe).
- ignore: {name: "Redundant maybe", within: [Proto.Internal.Maybe]}

# These types use unboxed sums where data (not newtype) is required for
# the pattern synonym machinery and to preserve semantics.
- ignore: {name: "Use newtype instead of data", within: [Proto.Internal.Wire.Decode, Proto.Internal.Either, Proto.Internal.Maybe]}

# ---------------------------------------------------------------------------
# Generated / vendored code
# ---------------------------------------------------------------------------
# temporal-test: generated from Temporal API protos
- ignore: {within: [Proto.Temporalio]}

# wireform-lance Pb modules: emitted by `cabal run wireform-lance:gen-lance-pb`
# from proto/lance/{file,file2,table}.proto. Fix in the codegen if needed.
- ignore: {within: [Lance.Pb]}

# compare-bench/gen: generated proto-lens comparison types
- ignore: {within: [Proto.Bench, Proto.Bench_Fields]}

# ---------------------------------------------------------------------------
# wireform-http: record-update lambda can't be eta-reduced to const
# ---------------------------------------------------------------------------
- ignore: {name: "Use const", within: [Network.HTTP.Server]}
