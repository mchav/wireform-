syntax = "proto3";

package example.person;

option java_package = "com.example.person";
option (custom_annotation) = { validate: true, max_size: 1024 };

enum PhoneType {
  PHONE_TYPE_UNSPECIFIED = 0;
  PHONE_TYPE_MOBILE = 1;
  PHONE_TYPE_HOME = 2;
  PHONE_TYPE_WORK = 3;
}

message PhoneNumber {
  string number = 1;
  PhoneType type = 2;
}

message Person {
  string name = 1;
  int32 id = 2;
  string email = 3;
  repeated PhoneNumber phones = 4;
  map<string, string> tags = 5;

  oneof avatar {
    string image_url = 6;
    bytes image_data = 7;
  }

  // Nested message
  message Address {
    string street = 1;
    string city = 2;
    string state = 3;
    string zip = 4;
    string country = 5;
  }

  Address home_address = 8;
  Address work_address = 9;

  reserved 10, 15 to 20;
  reserved "old_field", "deprecated_field";
}

message AddressBook {
  repeated Person people = 1;
}

service PersonService {
  rpc GetPerson (GetPersonRequest) returns (Person);
  rpc ListPeople (ListPeopleRequest) returns (stream Person);
  rpc AddPerson (Person) returns (AddPersonResponse) {
    option deprecated = true;
  }
}

message GetPersonRequest {
  int32 id = 1;
}

message ListPeopleRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message AddPersonResponse {
  bool success = 1;
  string error_message = 2;
}
