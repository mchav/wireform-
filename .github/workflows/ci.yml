name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.4', '9.8.4', '9.10.1', '9.12.1']
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: 'latest'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ hashFiles('wireform.cabal', 'wireform-grpc/wireform-grpc.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-

      - name: Install system dependencies
        # protobuf-compiler provides 'protoc', which 'temporal-test'
        # picks up at configure time via proto-lens-setup. Without it
        # 'cabal build all' aborts before any wireform-* package
        # gets compiled.
        #
        # libsnappy-dev / liblz4-dev / libzstd-dev are the C libraries
        # behind wireform-kafka's compression codecs and wireform-arrow's
        # ZSTD / LZ4 column-chunk decompression. wireform-kafka declares
        # them as pkg-config-depends, so cabal's dependency solver
        # refuses to resolve 'cabal build all' until they're installed.
        #
        # librdkafka-dev is required by hw-kafka-client, which the
        # wireform-kafka benchmark suite uses as a cross-check oracle.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            libbrotli-dev \
            librdkafka-dev \
            protobuf-compiler

      - name: Configure
        run: cabal configure --enable-tests --enable-benchmarks

      - name: Build all packages
        run: cabal build all

      - name: Run unit tests (wireform-test)
        run: cabal test wireform-test --test-show-details=streaming

      - name: Run conformance self-test
        run: cabal test conformance-self-test --test-show-details=streaming

      - name: Run temporal codegen compilation test
        run: cabal test temporal-codegen-test --test-show-details=streaming

      - name: Run per-package format test suites
        # Each format package owns its own test-suite; the umbrella
        # wireform-test doesn't include them. Run them explicitly so
        # CI catches regressions in the table-format readers.
        run: |
          cabal test wireform-iceberg:iceberg-test       --test-show-details=streaming
          cabal test wireform-iceberg:wireform-iceberg-derive-test --test-show-details=streaming
          cabal test wireform-delta:delta-test           --test-show-details=streaming
          cabal test wireform-hudi:hudi-test             --test-show-details=streaming
          cabal test wireform-lance:lance-test           --test-show-details=streaming

  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run HLint
        uses: haskell-actions/hlint-setup@v2

      # There's no top-level src/ in this workspace — each
      # wireform-* package has its own src/ tree. Point HLint
      # at wireform-core as a representative canary; we can
      # widen this to the rest of the tree once the initial
      # findings are triaged.
      - name: HLint wireform-core/src
        uses: haskell-actions/hlint-run@v2
        with:
          path: wireform-core/src/
          fail-on: warning

  benchmarks:
    name: Build Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.4'
          cabal-version: 'latest'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-bench-cabal-${{ hashFiles('wireform.cabal', 'wireform-grpc/wireform-grpc.cabal') }}
          restore-keys: |
            ${{ runner.os }}-bench-cabal-

      - name: Install system dependencies
        # librdkafka-dev is needed for wireform-kafka-bench's
        # hw-kafka-client comparison oracle.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            libbrotli-dev \
            librdkafka-dev

      - name: Build all benchmarks
        run: |
          cabal configure --enable-benchmarks
          cabal build exe:wireform-bench
          cabal build exe:avro-thrift-bench
          cabal build exe:all-formats-bench
          cabal build exe:profile
          cabal build exe:bench-grow

  codegen-roundtrip:
    name: Codegen roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.4'
          cabal-version: 'latest'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-codegen-cabal-${{ hashFiles('wireform.cabal') }}
          restore-keys: |
            ${{ runner.os }}-codegen-cabal-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            libbrotli-dev

      - name: Build code generator
        run: |
          cabal configure
          cabal build exe:wireform-gen

      - name: Generate well-known types and verify they compile
        run: |
          mkdir -p /tmp/gen-test
          # wireform-gen's CLI now dispatches on the format via
          # a subcommand: `wireform-gen proto -I ... -i ... -o ... -m ...`.
          for f in proto/google/protobuf/timestamp.proto \
                   proto/google/protobuf/duration.proto \
                   proto/google/protobuf/empty.proto \
                   proto/google/protobuf/field_mask.proto \
                   proto/google/protobuf/source_context.proto \
                   proto/google/protobuf/wrappers.proto \
                   proto/google/protobuf/struct.proto; do
            cabal exec wireform-gen -- proto -I proto -o /tmp/gen-test -m Proto -i "$f"
          done
          echo "Generated files:"
          find /tmp/gen-test -name "*.hs" -exec echo "  {}" \;
          echo "All well-known types generated successfully"
